name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master # 사용자 환경에 따라 master일 경우를 대비
  pull_request:
    branches:
      - main
      - master

# 빌드 작업 정의
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. GitHub 저장소의 코드를 로드 (Checkout)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Docker 빌드를 위한 최적화 도구 (Buildx) 셋업
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GitHub Secrets에 저장된 자격 증명을 이용해 Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 4. 저장소 텍스트 기반 소문자 변환 (Docker Tag 규칙 대응)
      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      # 5. Dockerfile 기반으로 이미지 빌드 후 Docker Hub에 Push
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 사용자의 Docker Hub ID 기반으로 레포지토리 이름 매핑 (형식: username/age-prediction-api:latest)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          # 빌드 캐시를 사용하여 속도 최적화
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:buildcache,mode=max

  deploy:
    # 앞선 빌드&푸시 작업이 성공적으로 끝난 후에만 실행되도록 설정
    needs: build-and-push
    # 사용자가 등록한 로컬 컴퓨터(Self-hosted Runner)에서 실행
    runs-on: self-hosted
    
    steps:
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Pull Latest Docker Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest

      - name: Stop and Remove Existing Container
        # [Windows 특화] 기존 컨테이너가 있으면 안전하게 정리
        shell: powershell
        run: |
          if (docker ps -a --format '{{.Names}}' | Select-String -Pattern "^age-prediction-api$") {
              Write-Host "불필요한 기존 컨테이너를 발견하여 정리합니다..."
              docker stop age-prediction-api
              docker rm age-prediction-api
          } else {
              Write-Host "이미 실행 중인 컨테이너가 없습니다."
          }

      - name: Run New Container
        # 새로운 이미지로 서버용 컨테이너 실행 (Background)
        shell: pwsh
        run: |
          docker run -d --name age-prediction-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
